<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Cartly</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="animations.css">
  <style>
    /* ── DARK PAYMENT DROPDOWN ── */
    #payment-method {
      background: black !important;
      color: var(--text) !important;
      border: 1px solid var(--bg3) !important;
      cursor: pointer;
    }

    #payment-method option {
      background: var(--bg1) !important;
      color: var(--text) !important;
      padding: 10px;
    }

    #payment-method:focus {
      border-color: var(--primary) !important;
      outline: none;
    }

    /* ── FILTER BUTTONS RESIZED ── */
    .order-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 50px;
      border: 1px solid var(--bg3);
      background: var(--bg2);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .filter-btn.active {
      background: var(--primary);
      color: #000;
      border-color: var(--primary);
    }

    /* ── QTY BUTTONS ── */
    .qty-btn {
      width: 32px !important;
      height: 32px !important;
      font-size: 16px !important;
      border-radius: 8px !important;
    }

    .remove-btn {
      font-size: 16px !important;
      padding: 6px 10px !important;
    }

    /* ── MODAL ── */
    .modal {
      background: var(--bg2) !important;
    }

    .modal-overlay {
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="index.html">
    <img src="./logo.png.png" alt="Cartly" style="height:90px;width:auto;vertical-align:middle;margin-left:100px;">
    
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="index.html#products">Shop</a></li>
    <li><a href="cart.html" class="active">
      <span class="cart-badge">Cart 🛒<span class="cart-count" style="display:none">0</span></span>
    </a></li>
    <li><a href="orders.html">Orders</a></li>
    <li id="nav-auth"></li>
  </ul>
  <button class="hamburger"><span></span><span></span><span></span></button>
</nav>

<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Your Cart</h1>
    <p class="page-sub" id="cart-subtitle">Loading your items...</p>
  </div>

  <div id="cart-main"></div>
</div>

<!-- Checkout Modal -->
<div class="modal-overlay" id="checkout-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Complete Your Order</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-alert"></div>
    <div class="form-group">
      <label class="form-label">Delivery Address</label>
      <input type="text" class="form-input" id="shipping-address" placeholder="Street, City, Province">
    </div>
    <div class="form-group">
      <label class="form-label">Payment Method</label>
      <select class="form-input" id="payment-method">
        <option value="cod">💵 Cash on Delivery</option>
        <option value="gcash">📱 GCash</option>
        <option value="card">💳 Credit / Debit Card</option>
      </select>
    </div>
    <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:16px;margin-bottom:24px">
      <div style="display:flex;justify-content:space-between;font-size:14px;color:var(--text-muted);margin-bottom:8px">
        <span>Subtotal</span><span id="modal-subtotal">—</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:14px;color:var(--text-muted);margin-bottom:8px">
        <span>Shipping</span><span>Free 🎉</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:700;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <span>Total</span><span style="color:var(--primary)" id="modal-total">—</span>
      </div>
    </div>
    <button class="btn-primary w-full" style="border-radius:var(--radius-sm);justify-content:center" onclick="confirmOrder()" id="confirm-btn">
      Place Order 🎉
    </button>
  </div>
</div>

<footer style="padding:30px 5%;background:var(--bg2);border-top:1px solid var(--border)">
  <div class="footer-bottom" style="border:none;padding:0">
    <span>© 2026 <strong style="color:var(--primary)">Cartly</strong>. All rights reserved.</span>
  </div>
</footer>

<script src="app.js"></script>
<script>
  if (!getToken()) {
    toast('Please login to view your cart.', 'info');
    setTimeout(() => window.location.href = 'login.html', 1500);
  }

  function renderCart() {
    const cart = getCart();
    const main = document.getElementById('cart-main');

    if (cart.length === 0) {
      document.getElementById('cart-subtitle').textContent = '0 items';
      main.innerHTML = emptyState('🛒', 'Your cart is empty', 'Looks like you haven\'t added anything yet.', 'Start Shopping →', 'index.html#products');
      return;
    }

    const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
    const count = cart.reduce((s, i) => s + i.quantity, 0);
    document.getElementById('cart-subtitle').textContent = `${count} item${count > 1 ? 's' : ''} in your cart`;

    main.innerHTML = `
      <div class="cart-layout">
        <div id="cart-items-list">
          ${cart.map((item, idx) => `
            <div class="cart-item" id="cart-item-${idx}">
              <div class="cart-item-img">
                ${item.image ? `<img src="${item.image}" alt="${item.name}">` : '🛍️'}
              </div>
              <div class="cart-item-info">
                <div class="cart-item-name">${item.name}</div>
                <div class="cart-item-price">${fmt(item.price)} each</div>
                <div style="font-size:13px;color:var(--text-dim);margin-top:2px">
                  Subtotal: ${fmt(item.price * item.quantity)}
                </div>
              </div>
              <div class="qty-control">
                <button class="qty-btn" onclick="changeQty(${idx},-1)">−</button>
                <span class="qty-num">${item.quantity}</span>
                <button class="qty-btn" onclick="changeQty(${idx},1)">+</button>
                <button class="remove-btn" onclick="removeItem(${idx})" title="Remove">🗑️</button>
              </div>
            </div>`).join('')}
          <div style="margin-top:16px">
            <a href="index.html#products" style="color:var(--text-muted);text-decoration:none;font-size:14px;display:inline-flex;align-items:center;gap:6px">
              ← Continue Shopping
            </a>
          </div>
        </div>

        <div class="cart-summary">
          <div class="summary-title">Order Summary</div>
          <div class="summary-row"><span>${count} item${count>1?'s':''}</span><span>${fmt(total)}</span></div>
          <div class="summary-row"><span>Shipping</span><span style="color:var(--success)">Free 🎉</span></div>
          <div class="summary-row total"><span>Total</span><span>${fmt(total)}</span></div>
          <button class="btn-primary w-full" style="border-radius:var(--radius-sm);justify-content:center" onclick="openCheckout(${total})">
            Checkout →
          </button>
          <div style="margin-top:16px;text-align:center;color:var(--text-dim);font-size:12px">
            🔒 Secured with 256-bit encryption
          </div>
        </div>
      </div>`;
  }

  function changeQty(index, change) {
    let cart = getCart();
    cart[index].quantity += change;
    if (cart[index].quantity <= 0) cart.splice(index, 1);
    setCart(cart);
    renderCart();
  }

  function removeItem(index) {
    let cart = getCart();
    const name = cart[index].name;
    cart.splice(index, 1);
    setCart(cart);
    renderCart();
    toast(`${name} removed from cart.`, 'info');
  }

  function openCheckout(total) {
    document.getElementById('modal-subtotal').textContent = fmt(total);
    document.getElementById('modal-total').textContent = fmt(total);
    document.getElementById('checkout-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('checkout-modal').classList.remove('open');
  }

  document.getElementById('checkout-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  async function confirmOrder() {
    const address = document.getElementById('shipping-address').value.trim();
    const payment = document.getElementById('payment-method').value;
    if (!address) {
      document.getElementById('modal-alert').innerHTML = `
        <div style="color:var(--error);font-size:14px;margin-bottom:12px">❌ Please enter your delivery address.</div>`;
      return;
    }

    const cart = getCart();
    const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
    const products = cart.map(i => ({ product: i.id, quantity: i.quantity }));

    const btn = document.getElementById('confirm-btn');
    btn.disabled = true; btn.textContent = 'Placing order...';

    try {
      const res = await fetch(`${API}/orders`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ products, totalPrice: total, shippingAddress: address, paymentMethod: payment })
      });
      const data = await res.json();
      if (res.ok) {
        setCart([]);
        closeModal();
        toast('Order placed successfully! 🎉', 'success', 4000);
        setTimeout(() => window.location.href = 'orders.html', 1500);
      } else {
        document.getElementById('modal-alert').innerHTML = `
          <div style="color:var(--error);font-size:14px;margin-bottom:12px">❌ ${data.message}</div>`;
        btn.disabled = false; btn.textContent = 'Place Order 🎉';
      }
    } catch {
      document.getElementById('modal-alert').innerHTML = `
        <div style="color:var(--error);font-size:14px;margin-bottom:12px">❌ Network error. Please try again.</div>`;
      btn.disabled = false; btn.textContent = 'Place Order 🎉';
    }
  }

  renderCart();
</script>
</body>
</html>
